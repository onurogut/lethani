name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint
        run: markdownlint-cli2 "**/*.md" "#engagements" "#00_infra/_archive" "#node_modules"

  linkcheck:
    name: linkcheck (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 7d
            --no-progress
            --exclude-mail
            --exclude '^https?://(?:USER|<USER>|.*example\.com|.*\.example|localhost|127\.0\.0\.1)'
            --exclude '169\.254\.169\.254'
            --include-fragments
            './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find . -type f \
            \( -name '*.sh' -o -path './bin/lethani' \) \
            -not -path './engagements/*' \
            -not -path './00_infra/_archive/*' \
            -print0 \
            | xargs -0 shellcheck -s bash -S warning
